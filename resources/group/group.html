<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玩家交流群 - STS2娘化MOD站</title>
<meta name="referrer" content="no-referrer">
<style>
:root{--bg:#faf7f4;--sm:#e89b9b;--sl:#f5c4c4;--mj:#a8d8c8;--bd:#4a4458;--tp:#3d3648;--ts:#6b6378;--tm:#9a92a5;--ss:0 4px 20px rgba(74,68,88,.08);--sd:0 14px 44px rgba(74,68,88,.18);--ft:'PingFang SC','Hiragino Sans GB','Noto Sans SC','Microsoft YaHei',sans-serif;--tb:cubic-bezier(.34,1.56,.64,1)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--ft);background:var(--bg);background-image:radial-gradient(ellipse at 15% 20%,rgba(232,155,155,.06) 0%,transparent 55%),radial-gradient(ellipse at 78% 65%,rgba(168,216,200,.07) 0%,transparent 55%),radial-gradient(ellipse at 40% 80%,rgba(200,184,216,.05) 0%,transparent 50%);background-attachment:fixed;color:var(--tp);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.pw{max-width:560px;margin:0 auto;padding:30px 24px 40px}
.ph{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:12px 20px;background:#fffdfb;border-radius:10px;box-shadow:var(--ss)}
.bb{display:flex;align-items:center;padding-right:14px;border-right:1.5px solid #e8e2dc;color:var(--tp);text-decoration:none;transition:color .2s;flex-shrink:0}
.bb:hover{color:var(--sm)}
.bb svg{width:18px;height:18px}
.phr{display:flex;flex-direction:column;gap:1px;min-width:0}
.pt{font-size:1.2rem;font-weight:700;white-space:nowrap;color:var(--tp)}
.ps{font-size:.76rem;color:var(--tm);line-height:1.4}
.ps-bottom{margin-top:24px;padding-top:16px;border-top:1px dashed #e0d8cc;text-align:center;font-size:.74rem;color:var(--tm)}
.gl{display:flex;flex-direction:column;gap:12px}
.gi{display:flex;align-items:center;gap:14px;padding:15px 18px;background:#fffdfb;border-radius:10px;box-shadow:var(--ss);transition:transform .25s var(--tb),box-shadow .25s var(--tb)}
.gi:hover{transform:translateY(-2px);box-shadow:var(--sd)}
.ga{width:42px;height:42px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#f5f2f8;display:block}
.gb{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.gr{display:flex;align-items:center;gap:8px;min-width:0}
.gn{font-weight:700;font-size:.92rem;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.gd{flex-shrink:0;padding:1px 8px;font-size:.62rem;font-weight:700;border-radius:4px;white-space:nowrap;letter-spacing:.02em;line-height:1.6}
.gd.qq{background:#fef0f0;color:#c06070}
.gd.tc{background:#e8f5e8;color:#3d6b4f}
.gm{display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-height:18px}
.gv{font-family:'SF Mono','JetBrains Mono','Consolas','Menlo',monospace;font-size:.76rem;font-weight:600;color:var(--ts);letter-spacing:.03em}
.go{color:#d5cdc0;font-size:.55rem;user-select:none;flex-shrink:0}
.gc{display:inline-flex;align-items:center;gap:2px;padding:0 7px;font-size:.66rem;font-weight:600;color:var(--sm);background:#fef0f0;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;line-height:1.7;border:none;font-family:var(--ft)}
.gc:hover{background:var(--sl);color:#c97a7a}
.gc:active{transform:scale(.96)}
.gk{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;padding:7px 16px;font-size:.78rem;font-weight:700;border-radius:7px;cursor:pointer;transition:all .2s var(--tb);text-decoration:none;white-space:nowrap;border:none;font-family:var(--ft)}
.gk.cp{background:var(--sm);color:#fff}
.gk.cp:hover{background:#c97a7a;transform:scale(1.04)}
.gk.jn{background:var(--mj);color:#fff}
.gk.jn:hover{background:#8cc8a0;transform:scale(1.04)}
.bf{margin-top:28px;text-align:center}
.bf a{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;color:var(--tm);font-size:.84rem;text-decoration:none;border-radius:8px;transition:all .2s}
.bf a:hover{color:var(--tp);background:#fffdfb}
.to{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#fffefb;border:1.5px solid #d5cdc0;border-radius:12px;padding:10px 22px;font-weight:550;font-size:.88rem;color:var(--tp);box-shadow:var(--sd);transition:transform .35s cubic-bezier(.34,1.4,.64,1);z-index:600;white-space:nowrap;pointer-events:none}
.to.sh{transform:translateX(-50%) translateY(0)}
.dark body{background:#1e1b25;color:#ddd8e8;background-image:radial-gradient(ellipse at 15% 20%,rgba(232,155,155,.04) 0%,transparent 55%),radial-gradient(ellipse at 78% 65%,rgba(168,216,200,.04) 0%,transparent 55%),radial-gradient(ellipse at 40% 80%,rgba(200,184,216,.03) 0%,transparent 50%)}
.dark .ph,.dark .gi{background:#2a2733;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.dark .bb{color:#ddd8e8;border-right-color:#3f3a4d}
.dark .bb:hover{color:var(--sm)}
.dark .pt,.dark .gn{color:#f0ecf5}
.dark .ps,.dark .gv{color:#9a94a8}
.dark .ps-bottom{border-top-color:#3f3a4d}
.dark .go{color:#3f3a4d}
.dark .gd.qq{background:#3a2228;color:#c07070}
.dark .gd.tc{background:#223a28;color:#7aaa80}
.dark .gc{background:#3a2228;color:#c97a7a}
.dark .gc:hover{background:#4a2a2e}
.dark .gk.cp{background:#c97a7a;color:#fff}
.dark .gk.cp:hover{background:#b06a6a}
.dark .gk.jn{background:#7aaa80;color:#fff}
.dark .gk.jn:hover{background:#6a9a70}
.dark .to{background:#2a2733;border-color:#3f3a4d;color:#ddd8e8}
.dark .ga{background:#322e3d}
.dark .bf a:hover{background:#2a2733;color:#f0ecf5}
@media(max-width:480px){.pw{padding:18px 16px 30px}.gi{padding:12px 14px;gap:12px}.ga{width:36px;height:36px;border-radius:9px}.gn{font-size:.88rem}.gk{padding:6px 12px;font-size:.74rem}.ph{padding:10px 14px}.pt{font-size:1.1rem}}
</style>
</head>
<body>
<div class="pw">
<header class="ph">
<a class="bb" href="../../index.html">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
</a>
<div class="phr">
<span class="pt">玩家交流群</span>
<span class="ps">加入玩家群，一起交流 MOD 与疑问解答</span>
</div>
</header>
<div class="gl" id="gl"></div>
<div class="ps ps-bottom">加群 or 频道需要填验证答案，不要忘了复制哦</div>
</div>
<div class="to" id="to"></div>
<script>
(function(){
var D=[
{name:'杀戮尖塔2 交流群组',bdg:'一群',bt:'qq',num:'1101853266',av:'https://p.qlogo.cn/gh/1101853266/1101853266/0',ans:'_冬雪寒',tp:'g',act:true},
{name:'杀戮尖塔2 交流频道',bdg:'频道',bt:'tc',num:'pd52310485',lk:'https://pd.qq.com/s/18petknya?b=9',ans:'_冬雪寒',av:'https://p.qlogo.cn/gh/1101853266/1101853266/0',tp:'c',act:true}
];
var L=document.getElementById('gl'),T=document.getElementById('to'),tt;
function ST(m){clearTimeout(tt);T.textContent=m;T.classList.add('sh');tt=setTimeout(function(){T.classList.remove('sh')},2200)}
function CP(t,m){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){ST(m)}).catch(function(){FB(t,m)})}else{FB(t,m)}}
function FB(t,m){var a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0;pointer-events:none;';document.body.appendChild(a);a.select();try{document.execCommand('copy');ST(m)}catch(e){ST('复制失败')}document.body.removeChild(a)}
D.forEach(function(d){
var i=document.createElement('div');i.className='gi';
var av=document.createElement('img');av.className='ga';av.src=d.av;av.alt='';av.loading='lazy';av.onerror=function(){this.style.display='none'};
var b=document.createElement('div');b.className='gb';
var r1=document.createElement('div');r1.className='gr';
var nm=document.createElement('span');nm.className='gn';nm.textContent=d.name;
var bg=document.createElement('span');bg.className='gd '+d.bt;bg.textContent=d.bdg;
r1.appendChild(nm);r1.appendChild(bg);
var r2=document.createElement('div');r2.className='gm';
var nv=document.createElement('span');nv.className='gv';nv.textContent=d.num;
r2.appendChild(nv);
if(d.ans){
var dot=document.createElement('span');dot.className='go';dot.textContent='·';
var ac=document.createElement('button');ac.className='gc';ac.textContent='答案: '+d.ans;
ac.addEventListener('click',function(){CP(d.ans,'验证答案已复制')});
r2.appendChild(dot);r2.appendChild(ac);
}
b.appendChild(r1);b.appendChild(r2);
var bt=document.createElement('a');
if(d.tp==='g'){bt.className='gk cp';bt.textContent='复制群号';bt.href='#';bt.addEventListener('click',function(e){e.preventDefault();CP(d.num,'群号已复制')})}
else{bt.className='gk jn';bt.textContent='进入频道';bt.href=d.lk;bt.target='_blank';bt.rel='noopener noreferrer'}
i.appendChild(av);i.appendChild(b);i.appendChild(bt);L.appendChild(i);
});
if(localStorage.getItem('sts2_dark_mode')==='1')document.documentElement.classList.add('dark');
})();
</script>
</body>
</html>
