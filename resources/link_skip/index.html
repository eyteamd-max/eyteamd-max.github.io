<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外部链接跳转 - STS2娘化MOD站</title>
<meta name="referrer" content="no-referrer">
<style>
:root{--bg:#faf7f4;--sm:#e89b9b;--sl:#f5c4c4;--mj:#a8d8c8;--cy:#fbe8c3;--lv:#c8b8d8;--bd:#4a4458;--tp:#3d3648;--ts:#6b6378;--tm:#9a92a5;--ss:0 4px 20px rgba(74,68,88,.08);--sd:0 14px 44px rgba(74,68,88,.18);--ft:'PingFang SC','Hiragino Sans GB','Noto Sans SC','Microsoft YaHei',sans-serif;--tb:cubic-bezier(.34,1.56,.64,1);--fm:'SF Mono','Fira Code','Consolas','Menlo',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--ft);background:var(--bg);background-image:radial-gradient(ellipse at 15% 20%,rgba(232,155,155,.06) 0%,transparent 55%),radial-gradient(ellipse at 78% 65%,rgba(168,216,200,.07) 0%,transparent 55%),radial-gradient(ellipse at 40% 80%,rgba(200,184,216,.05) 0%,transparent 50%),radial-gradient(circle at 60% 30%,rgba(251,232,195,.06) 0%,transparent 45%);background-attachment:fixed;color:var(--tp);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.top{background:#fffdfb;border-bottom:1.5px solid #e8e2dc;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:var(--ss)}
.top-in{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px;height:52px}
.back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;color:var(--ts);background:none;border:none;cursor:pointer;transition:all .2s;flex-shrink:0}
.back:hover{background:rgba(0,0,0,.05);color:var(--tp)}
.back svg{width:20px;height:20px}
.top-t{flex:1;min-width:0}
.top-t h1{font-size:1rem;font-weight:700;color:var(--tp);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-t p{font-size:.68rem;color:var(--tm);line-height:1.2;margin-top:1px}
.wrap{width:100%;max-width:520px;margin:0 auto;padding:24px 20px 48px;animation:fiu .4s ease-out}
@keyframes fiu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fffdfb;border-radius:12px;box-shadow:var(--sd);overflow:hidden;border:1.5px solid #e8e2dc}
.card-top{padding:24px 22px 20px;position:relative}
.card-top::after{content:'';position:absolute;bottom:0;left:22px;right:22px;height:1px;background:#e8e2dc}
.warn-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.warn-ic{flex-shrink:0;width:38px;height:38px;border-radius:10px;background:#fef0f0;border:1.5px solid #f0c0c0;display:flex;align-items:center;justify-content:center}
.warn-ic svg{width:18px;height:18px;color:#c06070}
.warn-txt h2{font-size:1.02rem;font-weight:700;color:var(--tp);line-height:1.3}
.warn-txt p{font-size:.78rem;color:var(--ts);margin-top:2px;line-height:1.45}
.link-sec{padding:16px 22px}
.link-box{background:var(--bg);border:1.5px solid #e8e2dc;border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .2s,background .2s}
.link-box:hover{border-color:#d5cdc0;background:#f5f2f0}
.link-lbl{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);font-weight:600;margin-bottom:6px;user-select:none;display:flex;align-items:center;gap:5px}
.link-lbl svg{width:11px;height:11px;opacity:.6}
.link-val{font-family:var(--fm);font-size:.8rem;color:var(--tp);line-height:1.65;word-break:break-all;font-weight:500;letter-spacing:.01em}
.link-empty{color:var(--tm);font-style:italic;font-family:var(--ft);font-weight:400;font-size:.84rem}
.notice{display:flex;align-items:flex-start;gap:9px;margin-top:14px;background:#fef0f0;border-radius:8px;padding:11px 13px;border:1.5px solid #f0c0c0;font-size:.78rem;color:#8a5050;line-height:1.55}
.notice svg{flex-shrink:0;width:15px;height:15px;margin-top:1px;color:#c06070}
.notice-t{flex:1;min-width:0}
.notice-t strong{font-weight:600;color:#7a3535}
.card-bot{padding:18px 22px 22px;display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;font-size:.88rem;font-weight:700;border-radius:8px;cursor:pointer;border:none;text-decoration:none;transition:all .25s var(--tb);white-space:nowrap;font-family:var(--ft);outline:none;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--sm);color:#fff;flex:1;min-width:0;border:1.5px solid #c97a7a}
.btn-p:hover{background:#c97a7a;transform:scale(1.02)}
.btn-p.ok{background:var(--mj);border-color:#8cc8a0}
.btn-p.ok:hover{background:#8cc8a0}
.btn-p:disabled{opacity:.4;cursor:not-allowed;pointer-events:none;transform:none}
.btn-s{background:#fffdfb;color:var(--tp);border:1.5px solid #e8e2dc;flex-shrink:0}
.btn-s:hover{background:var(--sl);color:#fff;border-color:#c97a7a;transform:scale(1.02)}
.btn svg{width:16px;height:16px;flex-shrink:0}
.foot{text-align:center;margin-top:20px;font-size:.74rem;color:var(--tm);letter-spacing:.02em}
.foot .sep{display:inline-block;width:3px;height:3px;border-radius:50%;background:#d5cdc0;margin:0 8px;vertical-align:middle;position:relative;top:-1px}
.to{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#fffefb;border:1.5px solid #d5cdc0;border-radius:12px;padding:10px 22px;font-weight:550;font-size:.86rem;color:var(--tp);box-shadow:var(--sd);transition:transform .35s cubic-bezier(.34,1.4,.64,1);z-index:600;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px}
.to.sh{transform:translateX(-50%) translateY(0)}
.to .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.to .dot.s{background:var(--mj)}
.to .dot.w{background:var(--cy)}
.dark body{background:#1e1b25;color:#ddd8e8;background-image:radial-gradient(ellipse at 15% 20%,rgba(232,155,155,.04) 0%,transparent 55%),radial-gradient(ellipse at 78% 65%,rgba(168,216,200,.04) 0%,transparent 55%),radial-gradient(ellipse at 40% 80%,rgba(200,184,216,.03) 0%,transparent 50%)}
.dark .top{background:#2a2733;border-bottom-color:#3f3a4d;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.dark .back{color:#9a94a8}
.dark .back:hover{background:rgba(255,255,255,.08);color:#f0ecf5}
.dark .top-t h1{color:#f0ecf5}
.dark .top-t p{color:#7a7490}
.dark .card{background:#2a2733;border-color:#3f3a4d;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.dark .card-top::after{background:#3f3a4d}
.dark .warn-ic{background:#3a2228;border-color:#6a4048}
.dark .warn-ic svg{color:#c07070}
.dark .warn-txt h2{color:#f0ecf5}
.dark .warn-txt p{color:#9a94a8}
.dark .link-box{background:#2a2733;border-color:#3f3a4d}
.dark .link-box:hover{background:#322e3d;border-color:#4a4560}
.dark .link-val{color:#f0ecf5}
.dark .link-empty{color:#6b6578}
.dark .link-lbl{color:#7a7490}
.dark .notice{background:#3a2228;border-color:#6a4048;color:#c07070}
.dark .notice svg{color:#c07070}
.dark .notice-t strong{color:#e08080}
.dark .btn-p{background:#c97a7a;border-color:#a06060;color:#fff}
.dark .btn-p:hover{background:#b06a6a}
.dark .btn-p.ok{background:#7aaa80;border-color:#6a9a70}
.dark .btn-p.ok:hover{background:#6a9a70}
.dark .btn-s{background:#2a2733;color:#ddd8e8;border-color:#3f3a4d}
.dark .btn-s:hover{background:#c97a7a;color:#fff;border-color:#c97a7a}
.dark .foot{color:#6b6578}
.dark .foot .sep{background:#3f3a4d}
.dark .to{background:#2a2733;border-color:#3f3a4d;color:#ddd8e8}
@media(max-width:480px){.wrap{padding:16px 14px 36px}.card-top{padding:20px 18px 16px}.card-top::after{left:18px;right:18px}.link-sec{padding:14px 18px}.card-bot{padding:16px 18px 20px;flex-direction:column}.btn-s{width:100%;justify-content:center}.warn-ic{width:34px;height:34px;border-radius:9px}.warn-ic svg{width:16px;height:16px}.warn-txt h2{font-size:.96rem}.warn-txt p{font-size:.74rem}.link-box{padding:12px 14px}.link-val{font-size:.76rem}.notice{font-size:.74rem;padding:10px 12px;gap:7px}.btn{padding:10px 16px;font-size:.84rem}.foot{font-size:.7rem;margin-top:16px}.top-in{height:48px}.top-t h1{font-size:.94rem}}
@media(min-width:768px){.wrap{padding:32px 20px 56px}.card-top{padding:28px 26px 22px}.card-top::after{left:26px;right:26px}.link-sec{padding:18px 26px}.card-bot{padding:20px 26px 24px}.warn-txt h2{font-size:1.06rem}.link-val{font-size:.84rem}}
</style>
</head>
<body>
<div class="top">
  <div class="top-in">
    <button class="back" onclick="location.href='../../index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="top-t">
      <h1>外部链接提示</h1>
      <p>复制前请确认链接安全</p>
    </div>
  </div>
</div>
<div class="to" id="toast"></div>
<div class="wrap">
  <div class="card">
    <div class="card-top">
      <div class="warn-row">
        <div class="warn-ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.8" fill="currentColor" stroke="none"/></svg>
        </div>
        <div class="warn-txt">
          <h2>以下为外部链接</h2>
          <p>确认安全后，复制到浏览器地址栏打开</p>
        </div>
      </div>
    </div>
    <div class="link-sec">
      <div class="link-box" id="linkDisplay">
        <div class="link-lbl">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          目标链接
        </div>
        <div class="link-val" id="linkUrl"><span class="link-empty">未提供有效链接</span></div>
      </div>
      <div class="notice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="notice-t"><strong>安全提醒：</strong>请核实链接来源，勿访问可疑网址，谨防钓鱼和诈骗。</span>
      </div>
    </div>
    <div class="card-bot">
      <button class="btn btn-p" id="btnCopy" onclick="copyLink()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="btnCopyText">复制链接</span>
      </button>
      <button class="btn btn-s" onclick="selectLink()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        选中链接
      </button>
    </div>
  </div>
  <p class="foot">请复制后粘贴至浏览器地址栏打开<span class="sep"></span>本站不对目标网站内容负责</p>
</div>
<script>
(function(){
  var DARK_KEY='sts2_dark_mode';
  function applyDark(d){if(d)document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark')}
  applyDark(localStorage.getItem(DARK_KEY)==='1');
  window.addEventListener('storage',function(e){if(e.key===DARK_KEY)applyDark(e.newValue==='1')});

  function getLinkParam(){return new URLSearchParams(window.location.search).get('link')||''}
  var link=getLinkParam();
  var linkUrlEl=document.getElementById('linkUrl');
  var linkDisplay=document.getElementById('linkDisplay');
  var btnCopy=document.getElementById('btnCopy');
  var btnCopyText=document.getElementById('btnCopyText');
  var toastEl=document.getElementById('toast');
  var toastTimer=null;

  if(link){
    linkUrlEl.innerHTML=link.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    linkUrlEl.classList.remove('link-empty');
    linkUrlEl.setAttribute('data-raw-link',link);
  }else{
    linkUrlEl.innerHTML='<span class="link-empty">未提供有效链接</span>';
    linkUrlEl.setAttribute('data-raw-link','');
    btnCopy.disabled=true;
  }

  function showToast(msg,type){
    if(toastTimer)clearTimeout(toastTimer);
    var c=type==='success'?'s':'w';
    toastEl.innerHTML='<span class="dot '+c+'"></span>'+msg;
    toastEl.className='to';
    requestAnimationFrame(function(){toastEl.classList.add('sh')});
    toastTimer=setTimeout(function(){toastEl.classList.remove('sh')},2200);
  }

  window.copyLink=function(){
    var raw=linkUrlEl.getAttribute('data-raw-link');
    if(!raw){showToast('没有可复制的链接','warn');return}
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(raw).then(onCopySuccess).catch(function(){fbCopy(raw)});
    }else fbCopy(raw);
  };

  function fbCopy(t){
    var ta=document.createElement('textarea');ta.value=t;
    ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none;';
    ta.setAttribute('readonly','');document.body.appendChild(ta);
    if(/ipad|iphone|ipod/i.test(navigator.userAgent)){
      ta.contentEditable='true';ta.readOnly=false;
      var r=document.createRange();r.selectNodeContents(ta);
      var s=window.getSelection();s.removeAllRanges();s.addRange(r);ta.setSelectionRange(0,999999);
    }else{ta.select();ta.setSelectionRange(0,999999)}
    try{document.execCommand('copy')?onCopySuccess():showToast('复制失败，请手动选择复制','warn')}
    catch(e){showToast('复制失败，请手动选择复制','warn')}
    document.body.removeChild(ta);
  }

  function onCopySuccess(){
    btnCopy.classList.add('ok');btnCopyText.textContent='已复制 ✓';
    var svg=btnCopy.querySelector('svg');
    if(svg)svg.innerHTML='<polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    showToast('链接已复制到剪贴板','success');
    setTimeout(function(){
      btnCopy.classList.remove('ok');btnCopyText.textContent='复制链接';
      if(svg)svg.innerHTML='<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
    },2200);
  }

  window.selectLink=function(){
    var raw=linkUrlEl.getAttribute('data-raw-link');
    if(!raw){showToast('没有可选的链接','warn');return}
    var r=document.createRange();r.selectNodeContents(linkUrlEl);
    var s=window.getSelection();s.removeAllRanges();s.addRange(r);
    showToast('链接已选中，可按 Ctrl+C 复制','warn');
  };

  linkDisplay.addEventListener('click',function(e){
    if(e.target.closest('button'))return;
    if(linkUrlEl.getAttribute('data-raw-link'))selectLink();
  });
})();
</script>
</body>
</html>
