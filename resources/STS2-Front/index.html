<div class="toast" id="toast"></div>
<script>
(function() {
var LIBS = {
baselib: {
name: 'BaseLib',
owner: 'Alchyr',
repo: 'BaseLib-StS2',
author: 'Alchyr',
cacheKey: 'sts2_baselib_cache'
},
ritsu: {
name: 'RitsuLib',
owner: 'BAKAOLC',
repo: 'STS2-RitsuLib',
author: 'BAKAOLC',
cacheKey: 'sts2_ritsu_cache'
}
};

var CACHE_DURATION = 15 * 60 * 1000;
var ITEMS_PER_PAGE = 10;

var cacheData = { baselib: null, ritsu: null };
var activeLib = 'baselib';
var currentPage = 1;
var toastTimer = null;
var isLoading = false;
var isInitialized = false;

var loadingOverlay = document.getElementById('loadingOverlay');
var loadingSub = document.getElementById('loadingSub');
var pageContainer = document.getElementById('pageContainer');
var latestCard = document.getElementById('latestCard');
var versionList = document.getElementById('versionList');
var paginationEl = document.getElementById('pagination');
var toastEl = document.getElementById('toast');
var tabBaselib = document.getElementById('tabBaselib');
var tabRitsu = document.getElementById('tabRitsu');
var pageTitle = document.getElementById('pageTitle');
var authorName = document.getElementById('authorName');
var ghLink = document.getElementById('ghLink');
var searchInput = document.getElementById('searchInput');
var searchDropdown = document.getElementById('searchDropdown');
var searchContainer = document.getElementById('searchContainer');

function showToast(msg) {
clearTimeout(toastTimer);
toastEl.textContent = msg;
toastEl.classList.add('show');
toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2200);
}

function esc(s) {
return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatSize(bytes) {
if (!bytes) return '';
if (bytes < 1024) return bytes + ' B';
if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
return (bytes / 1048576).toFixed(2) + ' MB';
}

function formatDate(dateStr) {
if (!dateStr) return '';
var dt = new Date(dateStr);
return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
}

function getLibCache(libKey) {
try {
var cached = localStorage.getItem(LIBS[libKey].cacheKey);
if (!cached) return null;
var data = JSON.parse(cached);
if (Date.now() - data.timestamp > CACHE_DURATION) return null;
return data;
} catch (e) { return null; }
}

function setLibCache(libKey, releases, latest) {
try {
localStorage.setItem(LIBS[libKey].cacheKey, JSON.stringify({
timestamp: Date.now(),
releases: releases,
latest: latest
}));
} catch (e) {}
}

function processRelease(release) {
if (!release || release.draft) return null;
var zipAssets = (release.assets || []).filter(function(asset) {
return asset && asset.name && asset.name.toLowerCase().endsWith('.zip');
});
if (zipAssets.length === 0) return null;
return {
tag_name: release.tag_name || release.name || 'Unknown',
name: release.name || release.tag_name || '',
body: release.body || '',
published_at: release.published_at || release.created_at || '',
html_url: release.html_url || release.url || '',
author: release.author ? release.author.login : (release.user ? release.user.login : 'Unknown'),
zipAssets: zipAssets,
firstZipUrl: zipAssets.length > 0 ? zipAssets[0].browser_download_url : '',
firstZipName: zipAssets.length > 0 ? zipAssets[0].name : '',
firstZipSize: zipAssets.length > 0 ? zipAssets[0].size : 0
};
}

async function fetchLibData(libKey) {
var lib = LIBS[libKey];
var latestUrl = 'https://api.github.com/repos/' + lib.owner + '/' + lib.repo + '/releases/latest';
var allUrl = 'https://api.github.com/repos/' + lib.owner + '/' + lib.repo + '/releases?per_page=100';
try {
var latestResp = await fetch(latestUrl, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
var latest = null;
if (latestResp.ok) {
var latestData = await latestResp.json();
latest = processRelease(latestData);
}
var allResp = await fetch(allUrl, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
var releases = [];
if (allResp.ok) {
var allData = await allResp.json();
releases = allData.map(processRelease).filter(function(r) { return r !== null; });
}
return { latest: latest, releases: releases };
} catch (e) {
console.error('获取 ' + libKey + ' 数据失败:', e);
return { latest: null, releases: [] };
}
}

async function preloadAllData() {
loadingSub.textContent = '｜> STS2 BaseLib And RitsuLib <｜';
var baselibCached = getLibCache('baselib');
var ritsuCached = getLibCache('ritsu');

if (baselibCached && ritsuCached) {
cacheData.baselib = baselibCached;
cacheData.ritsu = ritsuCached;
return;
}

var promises = [];
if (!baselibCached) {
promises.push(fetchLibData('baselib').then(function(data) {
cacheData.baselib = { timestamp: Date.now(), latest: data.latest, releases: data.releases };
setLibCache('baselib', data.releases, data.latest);
}));
} else {
cacheData.baselib = baselibCached;
}

if (!ritsuCached) {
promises.push(fetchLibData('ritsu').then(function(data) {
cacheData.ritsu = { timestamp: Date.now(), latest: data.latest, releases: data.releases };
setLibCache('ritsu', data.releases, data.latest);
}));
} else {
cacheData.ritsu = ritsuCached;
}

if (promises.length > 0) {
loadingSub.textContent = '正在从 GitHub Releases 获取数据...';
await Promise.all(promises);
}
}

function buildLatestSkeleton() {
return '<div class="latest-top"><div class="latest-left">' +
'<div class="sk sk-line-t sk-w40"></div>' +
'<div class="sk sk-line sk-w60"></div>' +
'</div><div class="latest-actions">' +
'<div class="sk sk-btn"></div>' +
'<div class="sk sk-btn"></div>' +
'</div></div>';
}

function buildListSkeleton(count) {
var h = '';
for (var i = 0; i < count; i++) {
h += '<div class="sk-card"><div style="display:flex;align-items:center;justify-content:space-between;gap:16px"><div style="flex:1;min-width:0">' +
'<div class="sk sk-line-t sk-w30"></div>' +
'<div class="sk sk-line sk-w50"></div>' +
'</div><div style="display:flex;gap:6px">' +
'<div class="sk sk-btn" style="width:60px;height:30px;"></div>' +
'<div class="sk sk-btn" style="width:60px;height:30px;"></div>' +
'</div></div></div>';
}
return h;
}

function buildLatestCard(release) {
if (!release) return '<div class="empty-state">暂无最新版本</div>';
return '<div class="latest-top">' +
'<div class="latest-left">' +
'<div class="latest-version-text">' +
'<span class="latest-version-num">' + esc(release.tag_name) + '</span>' +
'<span class="latest-version-sep">/</span>' +
'<span class="latest-version-tag">最新版本</span>' +
'<span class="latest-version-sep">/</span>' +
'<span class="latest-version-tag">' + esc(formatSize(release.firstZipSize)) + '</span>' +
'<span class="latest-version-sep">/</span>' +
'<span class="latest-version-tag">' + esc(formatDate(release.published_at)) + '</span>' +
'</div>' +
'<div class="latest-filename" title="' + esc(release.firstZipName) + '">' + esc(release.firstZipName) + '</div>' +
'</div>' +
'<div class="latest-actions">' +
'<a class="btn-dl" href="github_parsing/index.html?url=' + encodeURIComponent(release.firstZipUrl) + '" target="_blank" rel="noopener noreferrer">下载</a>' +
'<button class="btn-share" data-url="' + esc(release.firstZipUrl) + '">分享</button>' +
'</div></div>';
}

function buildVersionCard(release) {
if (!release) return '';
return '<div class="version-card-inner">' +
'<div class="version-left">' +
'<div class="version-header">' +
'<span class="version-name">' + esc(release.tag_name) + '</span>' +
'<span class="version-date">' + esc(formatDate(release.published_at)) + '</span>' +
'<span class="version-size">' + esc(formatSize(release.firstZipSize)) + '</span>' +
'</div>' +
'<div class="version-filename" title="' + esc(release.firstZipName) + '">' + esc(release.firstZipName) + '</div>' +
'</div>' +
'<div class="version-actions">' +
'<a class="version-dl-btn" href="github_parsing/index.html?url=' + encodeURIComponent(release.firstZipUrl) + '" target="_blank" rel="noopener noreferrer">下载</a>' +
'<button class="version-share-btn" data-url="' + esc(release.firstZipUrl) + '">分享</button>' +
'</div></div>';
}

function setupShareButtons() {
var buttons = document.querySelectorAll('[data-url]');
for (var i = 0; i < buttons.length; i++) {
buttons[i].addEventListener('click', function() {
var url = this.getAttribute('data-url');
copyToClipboard(url);
});
}
}

function copyToClipboard(zipUrl) {
var baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
var parsingPage = baseUrl + '/github_parsing/index.html';
var fullUrl = parsingPage + '?url=' + encodeURIComponent(zipUrl);
if (navigator.clipboard && navigator.clipboard.writeText) {
navigator.clipboard.writeText(fullUrl).then(function() {
showToast('链接已复制到剪贴板');
}).catch(function() {
fallbackCopy(fullUrl);
});
} else {
fallbackCopy(fullUrl);
}
}

function fallbackCopy(text) {
var textArea = document.createElement('textarea');
textArea.value = text;
textArea.style.position = 'fixed';
textArea.style.top = '0';
textArea.style.left = '0';
textArea.style.width = '2em';
textArea.style.height = '2em';
textArea.style.padding = '0';
textArea.style.border = 'none';
textArea.style.outline = 'none';
textArea.style.boxShadow = 'none';
textArea.style.background = 'transparent';
document.body.appendChild(textArea);
textArea.focus();
textArea.select();
try {
var successful = document.execCommand('copy');
if (successful) {
showToast('链接已复制到剪贴板');
} else {
showToast('复制失败，请手动复制');
}
} catch (err) {
showToast('复制失败，请手动复制');
}
document.body.removeChild(textArea);
}

function openGotoPopup(totalPages) {
var existing = document.getElementById('gotoPopupOverlay');
if (existing) existing.remove();
var overlay = document.createElement('div');
overlay.className = 'goto-popup-overlay active';
overlay.id = 'gotoPopupOverlay';
var popup = document.createElement('div');
popup.className = 'goto-popup';
var title = document.createElement('div');
title.className = 'goto-popup-title';
title.textContent = '跳转到第几页？(共 ' + totalPages + ' 页)';
var row = document.createElement('div');
row.className = 'goto-popup-row';
var input = document.createElement('input');
input.type = 'text';
input.className = 'goto-popup-input';
input.placeholder = '页码';
input.maxLength = 3;
input.inputMode = 'numeric';
input.addEventListener('input', function() {
this.value = this.value.replace(/[^\d]/g, '').slice(0, 3);
});
var confirmBtn = document.createElement('button');
confirmBtn.className = 'goto-popup-confirm';
confirmBtn.textContent = '跳转';
function doMobileGoto() {
var num = parseInt(input.value, 10);
if (isNaN(num) || num < 1 || num > totalPages) {
showToast('页码范围：1 ~ ' + totalPages);
return;
}
currentPage = num;
renderHistory();
overlay.remove();
setTimeout(function() {
document.querySelector('.history-section').scrollIntoView({behavior: 'smooth', block: 'start'});
}, 50);
}
input.addEventListener('keydown', function(e) {
if (e.key === 'Enter') doMobileGoto();
});
confirmBtn.addEventListener('click', doMobileGoto);
overlay.addEventListener('click', function(e) {
if (e.target === overlay) overlay.remove();
});
row.appendChild(input);
row.appendChild(confirmBtn);
popup.appendChild(title);
popup.appendChild(row);
overlay.appendChild(popup);
document.body.appendChild(overlay);
setTimeout(function() { input.focus(); }, 100);
}

function renderPagination(totalItems, currentPageNum) {
paginationEl.innerHTML = '';
var totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
if (totalPages <= 1) return;

function createBtn(cls, content, disabled, handler) {
var btn = document.createElement('button');
btn.className = cls;
btn.innerHTML = content;
if (disabled) btn.disabled = true;
if (handler) btn.addEventListener('click', handler);
return btn;
}

function createPageBtn(num) {
return createBtn('pagination-page' + (num === currentPageNum ? ' active' : ''), num, false, function() {
currentPage = num;
renderHistory();
document.querySelector('.history-section').scrollIntoView({behavior: 'smooth', block: 'start'});
});
}

function createDots() {
var s = document.createElement('span');
s.className = 'pagination-dots';
s.textContent = '...';
return s;
}

var items = [];

items.push(createBtn('pagination-btn', '‹', currentPageNum <= 1, function() {
if (currentPage > 1) {
currentPage--;
renderHistory();
document.querySelector('.history-section').scrollIntoView({behavior: 'smooth', block: 'start'});
}
}));

if (totalPages <= 5) {
for (var i = 1; i <= totalPages; i++) {
items.push(createPageBtn(i));
}
} else {
items.push(createPageBtn(1));
if (currentPageNum <= 3) {
for (var j = 2; j <= 5; j++) {
items.push(createPageBtn(j));
}
items.push(createDots());
items.push(createPageBtn(totalPages));
} else if (currentPageNum >= totalPages - 2) {
items.push(createDots());
for (var k = totalPages - 3; k <= totalPages; k++) {
items.push(createPageBtn(k));
}
} else {
items.push(createDots());
items.push(createPageBtn(currentPageNum - 1));
items.push(createPageBtn(currentPageNum));
items.push(createPageBtn(currentPageNum + 1));
items.push(createDots());
items.push(createPageBtn(totalPages));
}
}

items.push(createBtn('pagination-btn', '›', currentPageNum >= totalPages, function() {
if (currentPage < totalPages) {
currentPage++;
renderHistory();
document.querySelector('.history-section').scrollIntoView({behavior: 'smooth', block: 'start'});
}
}));

var gotoWrap = document.createElement('span');
gotoWrap.className = 'pagination-goto';
var gotoInput = document.createElement('input');
gotoInput.type = 'text';
gotoInput.className = 'pagination-goto-input';
gotoInput.placeholder = '\\';
gotoInput.maxLength = 3;
gotoInput.setAttribute('aria-label', '输入页码');
var gotoBtn = document.createElement('button');
gotoBtn.className = 'pagination-goto-btn';
gotoBtn.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17.5" y2="17.5"/></svg>';
gotoBtn.setAttribute('aria-label', '跳转到指定页');
var gotoMobile = document.createElement('button');
gotoMobile.className = 'pagination-goto-mobile-trigger';
gotoMobile.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17.5" y2="17.5"/></svg>';
gotoMobile.setAttribute('aria-label', '跳转页码');

function doGoto(value) {
var num = parseInt(value, 10);
if (isNaN(num) || num < 1 || num > totalPages) {
showToast('页码范围：1 ~ ' + totalPages);
return;
}
currentPage = num;
renderHistory();
document.querySelector('.history-section').scrollIntoView({behavior: 'smooth', block: 'start'});
gotoInput.value = '';
}

gotoInput.addEventListener('input', function() {
this.value = this.value.replace(/[^\d]/g, '').slice(0, 3);
});
gotoInput.addEventListener('keydown', function(e) {
if (e.key === 'Enter') doGoto(this.value);
});
gotoBtn.addEventListener('click', function() {
doGoto(gotoInput.value);
});
gotoMobile.addEventListener('click', function() {
openGotoPopup(totalPages);
});

gotoWrap.appendChild(gotoInput);
gotoWrap.appendChild(gotoBtn);
gotoWrap.appendChild(gotoMobile);
items.push(gotoWrap);

items.forEach(function(it) { paginationEl.appendChild(it); });
}

function renderHistory() {
var data = cacheData[activeLib];
if (!data || !data.releases) {
versionList.innerHTML = '<div class="empty-state">暂无历史版本</div>';
paginationEl.innerHTML = '';
return;
}
var latestTag = data.latest ? data.latest.tag_name : '';
var historyData = data.releases.filter(function(r) {
return r.tag_name !== latestTag;
});
var start = (currentPage - 1) * ITEMS_PER_PAGE;
var pageData = historyData.slice(start, start + ITEMS_PER_PAGE);
versionList.innerHTML = buildListSkeleton(Math.min(pageData.length || 3, 4));
paginationEl.innerHTML = '';
setTimeout(function() {
versionList.innerHTML = '';
if (pageData.length === 0) {
versionList.innerHTML = '<div class="empty-state">暂无历史版本</div>';
return;
}
for (var i = 0; i < pageData.length; i++) {
var release = pageData[i];
var card = document.createElement('div');
card.className = 'version-card';
card.innerHTML = buildVersionCard(release);
versionList.appendChild(card);
}
setupShareButtons();
renderPagination(historyData.length, currentPage);
}, 200);
}

function renderLatest() {
var data = cacheData[activeLib];
if (!data) {
latestCard.innerHTML = '<div class="empty-state">暂无最新版本</div>';
return;
}
latestCard.innerHTML = buildLatestCard(data.latest);
setupShareButtons();
}

function updateSearchDropdown() {
var query = searchInput.value.trim().toLowerCase();
searchDropdown.innerHTML = '';
if (query.length < 1) {
searchDropdown.classList.remove('active');
return;
}
var data = cacheData[activeLib];
if (!data || !data.releases) {
searchDropdown.classList.remove('active');
return;
}
var results = [];
var latestTag = data.latest ? data.latest.tag_name : '';
for (var i = 0; i < data.releases.length; i++) {
var r = data.releases[i];
// 只搜索历史版本，排除最新版本
if (r.tag_name === latestTag) continue;
if (r.tag_name.toLowerCase().indexOf(query) !== -1 || (r.body && r.body.toLowerCase().indexOf(query) !== -1)) {
results.push({ item: r });
}
}
if (results.length === 0) {
searchDropdown.innerHTML = '<li class="search-dropdown-empty">没有找到匹配的版本</li>';
searchDropdown.classList.add('active');
return;
}
var rx = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
for (var j = 0; j < Math.min(results.length, 10); j++) {
var result = results[j];
var li = document.createElement('li');
li.className = 'search-dropdown-item';
li.innerHTML = '<span class="search-item-type history">历史</span><span>' + result.item.tag_name.replace(rx, '<mark>$1</mark>') + '</span>';
li.addEventListener('click', function() {
searchInput.value = '';
searchDropdown.classList.remove('active');
});
searchDropdown.appendChild(li);
}
searchDropdown.classList.add('active');
}

searchInput.addEventListener('input', updateSearchDropdown);
searchInput.addEventListener('focus', function() {
if (searchInput.value.trim().length >= 1) updateSearchDropdown();
});
searchInput.addEventListener('keydown', function(e) {
if (e.key === 'Escape') {
searchDropdown.classList.remove('active');
searchInput.blur();
}
if (e.key === 'Enter') searchDropdown.classList.remove('active');
});
document.addEventListener('click', function(e) {
if (!searchContainer.contains(e.target)) searchDropdown.classList.remove('active');
});

function switchTab(lib) {
if (isLoading || lib === activeLib) return;
activeLib = lib;
currentPage = 1;
var libConfig = LIBS[lib];
tabBaselib.classList.toggle('active', lib === 'baselib');
tabRitsu.classList.toggle('active', lib === 'ritsu');
pageTitle.textContent = '前置模组 ' + libConfig.name;
authorName.textContent = libConfig.author;
ghLink.href = 'https://github.com/' + libConfig.owner + '/' + libConfig.repo;
renderLatest();
renderHistory();
}

tabBaselib.addEventListener('click', function() { switchTab('baselib'); });
tabRitsu.addEventListener('click', function() { switchTab('ritsu'); });

async function init() {
var startTime = Date.now();
await preloadAllData();
var elapsed = Date.now() - startTime;
var minDelay = 500;
var maxDelay = 5000;
var remaining = Math.max(minDelay, Math.min(maxDelay - elapsed, maxDelay));
setTimeout(function() {
loadingOverlay.classList.add('hide');
pageContainer.classList.add('show');
isInitialized = true;
renderLatest();
renderHistory();
}, remaining);
}

init();
})();
</script>
