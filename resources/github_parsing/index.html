* { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

<script>
var GITHUB_PROXIES = [
  {name:'dl.axxxx.cyou',url:'https://dl.axxxx.cyou/',desc:'自建节点'},
  {name:'tvv.tw',url:'https://tvv.tw/',desc:'高速备用'}
];

var FALLBACK_PROXY = 'http://dl.axxxx.cyou/';
var GITHUB_RELEASE_URL = '';
var GITHUB_REPO_URL = '';
var RELEASE = {
  version: '-',
  publishedAt: '-',
  author: '-',
  fileName: '-',
  fileSize: '-',
  downloadCount: '-',
  htmlUrl: '-'
};
var proxyResults = [];
var isTesting = false;
var LATENCY_TIMEOUT = 3000;
var SPEED_TIMEOUT = 3000;
var PING_COUNT = 2;
var PING_INTERVAL = 100;
var LATENCY_CUTOFF = 3000;
var ANOMALY_RATIO = 3;
var ANOMALY_PENALTY = 0.6;
var RETRY_DELAY = 500;
var AUTO_DOWNLOAD = true;

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function parseGitHubRepoUrl(url) {
  if (!url) return null;
  var match = url.match(/^https?:\/\/github\.com\/([^\/]+)\/([^\/]+)\/?/);
  if (match && match[1] && match[2]) {
    return { owner: match[1], repo: match[2], fullName: match[1] + '/' + match[2] };
  }
  return null;
}

function autoFitFooter() {
  var footer = document.querySelector('.footer-text');
  if (!footer) return;
  var cw = footer.clientWidth;
  if (cw < 50) return;
  var m = document.createElement('span');
  m.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-size:12px;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;';
  m.textContent = footer.textContent;
  document.body.appendChild(m);
  var tw = m.offsetWidth;
  document.body.removeChild(m);
  if (tw <= 0) return;
  var fs = 12 * cw * 0.96 / tw;
  fs = Math.max(9, Math.min(14, fs));
  footer.style.fontSize = fs.toFixed(1) + 'px';
}

var _segs = [], _vis = 0, _timer = null, _phase = 'latency', _targetFs = '';

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function totalLen() {
  var n = 0;
  for (var i = 0; i < _segs.length; i++) {
    if (i > 0) n += 3;
    n += _segs[i].text.length;
  }
  return n;
}

function calcTopFs() {
  if (_segs.length < 2) { _targetFs = ''; return; }
  var el = document.getElementById('top-status');
  if (!el) return;
  var cw = el.clientWidth;
  if (cw < 50) return;
  var fullText = '';
  for (var i = 0; i < _segs.length; i++) {
    if (i > 0) fullText += ' / ';
    fullText += _segs[i].text;
  }
  if (!fullText) return;
  var m = document.createElement('span');
  m.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-size:14px;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;';
  m.textContent = fullText;
  el.appendChild(m);
  var tw = m.offsetWidth;
  el.removeChild(m);
  if (tw <= 0) return;
  var fs = 14 * cw * 1.8 / tw;
  fs = Math.min(17, Math.max(11, fs));
  var tester = document.createElement('p');
  tester.style.cssText = 'position:absolute;visibility:hidden;width:' + cw + 'px;margin:0;padding:0;font-size:' + fs + 'px;line-height:1.625;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;';
  tester.textContent = fullText;
  el.appendChild(tester);
  var twoLineH = fs * 1.625 * 2;
  for (var iter = 0; iter < 5; iter++) {
    if (tester.offsetHeight <= twoLineH + 1) break;
    fs = fs * 0.9;
    tester.style.fontSize = fs + 'px';
    twoLineH = fs * 1.625 * 2;
  }
  el.removeChild(tester);
  _targetFs = fs.toFixed(1) + 'px';
}

function initTopStatus() {
  _segs = [{text:'正在从Github开源库查找最新版本...',cls:'text-slate-400'}];
  _vis = 0;
  _phase = 'latency';
  _targetFs = '';
  clearTimeout(_timer);
  renderTop();
}

function ensureSeg(idx) {
  var n = 0;
  for (var i = 0; i <= idx && i < _segs.length; i++) {
    if (i > 0) n += 3;
    n += _segs[i].text.length;
  }
  clearTimeout(_timer);
  if (_vis < n) { _vis = n; renderTop(); }
}

function smoothTo(target) {
  clearTimeout(_timer);
  if (_vis >= target) return;
  (function step() {
    if (_vis < target) {
      _vis++;
      renderTop();
      var rem = target - _vis;
      _timer = setTimeout(step, rem > 25 ? 8 : rem > 12 ? 28 : rem > 5 ? 48 : 65);
    }
  })();
}

function syncTyping(pct) {
  if (_phase === 'latency' && _segs.length > 0) {
    var len = _segs[0].text.length;
    smoothTo(Math.max(0, Math.min(Math.round(len * pct / 100), len)));
  } else if (_phase === 'speed' && _segs.length > 1) {
    var s1 = _segs[0].text.length;
    var s2 = _segs[1].text.length;
    var s2t = Math.max(0, Math.min(Math.round(s2 * pct / 100), s2));
    smoothTo(s1 + 3 + s2t);
  }
}

function fastTypeToEnd() {
  return new Promise(function(resolve) {
    clearTimeout(_timer);
    var target = totalLen();
    (function step() {
      if (_vis < target) {
        _vis++;
        renderTop();
        _timer = setTimeout(step, 36);
      } else {
        renderTop();
        resolve();
      }
    })();
  });
}

function addSegAndType(text, cls) {
  _segs.push({text: text, cls: cls || 'text-slate-400'});
  return fastTypeToEnd();
}

function addSeg(text, cls) {
  _segs.push({text: text, cls: cls || 'text-slate-400'});
}

function renderTop() {
  var c = document.getElementById('top-status');
  var total = totalLen();
  var typing = _vis < total;
  var html = '<p class="leading-relaxed text-xs"';
  if (_targetFs) html += ' style="font-size:' + _targetFs + '"';
  html += '>';
  var ci = 0;
  for (var i = 0; i < _segs.length; i++) {
    var sep = i > 0 ? ' / ' : '';
    var segText = sep + _segs[i].text;
    if (_vis <= ci) break;
    var vc = Math.min(segText.length, _vis - ci);
    if (i > 0 && vc > 0) {
      var sepLen = Math.min(3, vc);
      html += '<span class="text-slate-300 mx-0.5">' + esc(sep.substring(0, sepLen)) + '</span>';
      if (vc > 3) {
        html += '<span class="' + _segs[i].cls + '">' + esc(segText.substring(3, vc)) + '</span>';
      }
    } else {
      html += '<span class="' + _segs[i].cls + '">' + esc(segText.substring(0, vc)) + '</span>';
    }
    ci += segText.length;
  }
  if (typing) {
    html += '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
  }
  html += '</p>';
  c.innerHTML = html;
}

var _t0 = 0, _tid = null;

function startTimer() {
  _t0 = performance.now();
  var e = document.getElementById('elapsed-time');
  e.textContent = '0.0s';
  clearInterval(_tid);
  _tid = setInterval(function() { e.textContent = ((performance.now() - _t0) / 1000).toFixed(1) + 's'; }, 100);
}

function stopTimer() {
  clearInterval(_tid);
  var s = ((performance.now() - _t0) / 1000).toFixed(1);
  document.getElementById('elapsed-time').textContent = s + 's';
  return s;
}

var releaseFetched = false;
var currentRepoInfo = null;

async function fetchRelease() {
  if (!currentRepoInfo) return;
  try {
    var apiUrl = 'https://api.github.com/repos/' + currentRepoInfo.fullName + '/releases/latest';
    var r = await fetch(apiUrl, {headers: {'Accept': 'application/vnd.github.v3+json'}});
    if (!r.ok) throw new Error('GitHub API 请求失败: ' + r.status);
    var d = await r.json();
    if (d.tag_name) RELEASE.version = d.tag_name;
    if (d.published_at) {
      var dt = new Date(d.published_at);
      RELEASE.publishedAt = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
    }
    if (d.author && d.author.login) RELEASE.author = d.author.login;
    if (d.html_url) RELEASE.htmlUrl = d.html_url;
    if (d.assets && d.assets.length > 0) {
      var a = d.assets[0];
      if (a.name) RELEASE.fileName = a.name;
      if (a.size) RELEASE.fileSize = (a.size / 1048576).toFixed(2) + ' MB';
      if (typeof a.download_count === 'number') RELEASE.downloadCount = a.download_count.toLocaleString();
      if (a.browser_download_url) GITHUB_RELEASE_URL = a.browser_download_url;
    }
    releaseFetched = true;
    var n = document.getElementById('header-filename');
    if (n) n.textContent = RELEASE.fileName;
    var sz = document.getElementById('header-size');
    if (sz) sz.textContent = RELEASE.fileSize;
    var p = document.getElementById('header-repo');
    if (p) p.textContent = currentRepoInfo.fullName;
    var repoLink = document.getElementById('header-repo-link');
    if (repoLink) { repoLink.href = GITHUB_REPO_URL; repoLink.classList.remove('hidden'); }
    var directLink = document.getElementById('direct-release-link');
    if (directLink) directLink.href = GITHUB_REPO_URL + '/releases/latest';
  } catch (e) {
    console.error('获取 Release 信息失败:', e);
    document.getElementById('testing-status').classList.add('hidden');
    document.getElementById('live-list').classList.add('hidden');
    var errorCard = document.getElementById('error-card');
    document.getElementById('error-title').textContent = '获取仓库信息失败';
    document.getElementById('error-desc').textContent = '无法获取该仓库的最新 Release 信息，请检查链接是否正确或仓库是否存在。';
    errorCard.classList.remove('hidden');
    throw e;
  }
}

async function measureLatency(url, timeout) {
  timeout = timeout || LATENCY_TIMEOUT;
  var s = performance.now();
  var c = new AbortController();
  var t = setTimeout(function() { c.abort(); }, timeout);
  try {
    await fetch(url + (url.indexOf('?') > -1 ? '&' : '?') + '_t=' + Date.now(), { method: 'HEAD', mode: 'no-cors', signal: c.signal });
    clearTimeout(t);
    return {success: true, latency: Math.round(performance.now() - s)};
  } catch (e) {
    clearTimeout(t);
    return {success: false, latency: timeout, error: e.name === 'AbortError' ? '超时' : '失败'};
  }
}

function measureSpeedByMultiplePings(proxyUrl) {
  return new Promise(function(resolve) {
    var pings = [];
    var count = 0;
    var maxP = PING_COUNT;
    var testUrl = proxyUrl + GITHUB_RELEASE_URL;
    function doPing() {
      if (count >= maxP) {
        var vp = pings.filter(function(p) { return p < 10000; });
        if (!vp.length) { resolve({success: false, speed: 0, error: '全部超时', hasAnomaly: true}); return; }
        var sorted = vp.slice().sort(function(a, b) { return a - b; });
        if (sorted.length > 2) sorted = sorted.slice(1, -1);
        var median = sorted[Math.floor(sorted.length / 2)];
        var avg = vp.reduce(function(a, b) { return a + b; }, 0) / vp.length;
        var v = vp.reduce(function(a, b) { return a + Math.pow(b - avg, 2); }, 0) / vp.length;
        var st = Math.sqrt(v) / Math.max(avg, 1);
        var maxPing = Math.max.apply(null, vp);
        var hasAnomaly = maxPing > median * ANOMALY_RATIO;
        var bs = 0;
        if (median < 300) bs = 2500;
        else if (median < 500) bs = 1500;
        else if (median < 1000) bs = 800;
        else if (median < 2000) bs = 300;
        else if (median < 5000) bs = 100;
        else bs = 20;
        var f = Math.max(.5, 1 - st);
        var sp = bs * f;
        if (hasAnomaly) sp = sp * ANOMALY_PENALTY;
        var noteText = vp.length + '次采样';
        noteText += hasAnomaly ? ' · 延迟异常' : ' · 稳定';
        resolve({ success: true, speed: parseFloat(sp.toFixed(0)), stability: parseFloat(st.toFixed(2)), hasAnomaly: hasAnomaly, note: noteText });
        return;
      }
      var s = performance.now();
      var c = new AbortController();
      var t = setTimeout(function() { c.abort(); }, SPEED_TIMEOUT);
      fetch(testUrl + '?_t=' + Date.now() + '_' + count, { method: 'HEAD', mode: 'no-cors', signal: c.signal })
        .then(function() { clearTimeout(t); pings.push(performance.now() - s); count++; setTimeout(doPing, PING_INTERVAL); })
        .catch(function() { clearTimeout(t); pings.push(10000); count++; setTimeout(doPing, PING_INTERVAL); });
    }
    doPing();
  });
}

function getScore(l, s) {
  var ls = Math.max(0, 100 - (l / 5000) * 100);
  var ss = Math.min(100, (s / 3072) * 100);
  return Math.round(ls * .3 + ss * .7);
}

function scoreColor(s) {
  if (s >= 80) return {bg: 'bg-emerald-50', text: 'text-emerald-600'};
  if (s >= 60) return {bg: 'bg-amber-50', text: 'text-amber-600'};
  if (s >= 30) return {bg: 'bg-orange-50', text: 'text-orange-600'};
  return {bg: 'bg-red-50', text: 'text-red-600'};
}

function latencyLabel(ms) {
  if (ms < 500) return {text: '极速', cls: 'text-emerald-600'};
  if (ms < 2000) return {text: '可用', cls: 'text-amber-600'};
  return {text: '较慢', cls: 'text-orange-600'};
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  t.style.animation = 'fadeInUp .3s ease';
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.style.animation = 'fadeIn .25s ease reverse forwards'; setTimeout(function() { t.classList.add('hidden'); }, 250); }, 2000);
}

function triggerDownload(url, filename) {
  var a = document.createElement('a');
  a.href = url;
  if (filename) a.download = filename;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function showProgress(label, cur, total) {
  document.getElementById('progress-label').textContent = label;
  document.getElementById('progress-count').textContent = cur + ' / ' + total;
  var pct = Math.round(cur / total * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  syncTyping(pct);
}

function setStatus(t) { document.getElementById('status-text').textContent = t; }

var _rowMap = {};
var _listReady = false;
var _flipCleanup = null;

function _getPhase(item) {
  if (item._skip) return 'skipped';
  if (item._tl) return 'testing-latency';
  if (item._ts) return 'testing-speed';
  if (item._ld && !item.latencySuccess) return 'failed';
  if (item._ld && !item._sd) return 'latency-done';
  if (item._sd) return item.speedSuccess ? 'speed-done' : 'failed';
  return 'waiting';
}

function _statusHtml(item, phase) {
  if (phase === 'waiting') return '<span class="text-xs text-slate-300">等待中</span>';
  if (phase === 'testing-latency') return '<span class="text-xs text-indigo-500 font-medium">测延迟中...</span>';
  if (phase === 'testing-speed') return '<span class="text-xs text-indigo-500 font-medium">测速度中...</span>';
  if (phase === 'skipped') return '<span class="text-xs text-slate-300">延迟过高，已跳过</span>';
  if (phase === 'latency-done') {
    return item.latencySuccess ? '<span class="text-xs font-mono ' + latencyLabel(item.latency).cls + '">' + item.latency + 'ms</span>' : '<span class="text-xs text-red-400">不可用</span>';
  }
  if (phase === 'speed-done') {
    if (item.speedSuccess) {
      var speedText = item.speed >= 1024 ? (item.speed / 1024).toFixed(1) + ' MB/s' : item.speed + ' KB/s';
      var anomalyTag = item.hasAnomaly ? '<span class="text-xs ml-1.5 text-orange-500">延迟异常</span>' : '<span class="text-xs ml-1.5 text-emerald-500">稳定</span>';
      return '<span class="text-xs font-mono text-slate-600">' + speedText + '</span>' + anomalyTag;
    }
    return '<span class="text-xs text-red-400">失败</span>';
  }
  if (phase === 'failed') return '<span class="text-xs text-red-400">不可用</span>';
  return '';
}

function _rowOpacityClass(phase) {
  if (phase === 'failed') return 'opacity-40';
  if (phase === 'waiting' || phase === 'skipped') return 'opacity-50';
  return '';
}

function _rowInnerHtml(item) {
  var phase = _getPhase(item);
  return '<div class="flex items-center gap-3">' +
    '<span class="text-sm font-medium text-slate-700 whitespace-nowrap">' + item.name + '</span>' +
    '<span class="text-xs text-slate-400 whitespace-nowrap">' + item.desc + '</span>' +
    '</div>' +
    '<div class="whitespace-nowrap flex items-center">' + _statusHtml(item, phase) + '</div>';
}

function _getSortedOrder() {
  var indices = [];
  for (var i = 0; i < proxyResults.length; i++) indices.push(i);
  var inSpeedPhase = proxyResults.some(function(r) { return r._sd || r._ts; });
  indices.sort(function(a, b) {
    var ra = proxyResults[a], rb = proxyResults[b];
    if (inSpeedPhase) {
      var aRank = ra.speedSuccess ? 3 : (ra._ld && ra.latencySuccess && !ra._skip) ? 2 : (ra._ld ? 1 : 0);
      var bRank = rb.speedSuccess ? 3 : (rb._ld && rb.latencySuccess && !rb._skip) ? 2 : (rb._ld ? 1 : 0);
      if (aRank !== bRank) return bRank - aRank;
      if (aRank === 3 && bRank === 3) return rb.speed - ra.speed;
      if (aRank === 2 && bRank === 2) return ra.latency - rb.latency;
      return 0;
    } else {
      var aRank2 = (ra._ld && ra.latencySuccess) ? 2 : (ra._ld ? 1 : 0);
      var bRank2 = (rb._ld && rb.latencySuccess) ? 2 : (rb._ld ? 1 : 0);
      if (aRank2 !== bRank2) return bRank2 - aRank2;
      if (aRank2 === 2 && bRank2 === 2) return ra.latency - rb.latency;
      return 0;
    }
  });
  return indices;
}

function initLiveList() {
  var c = document.getElementById('live-list');
  c.classList.remove('hidden');
  c.innerHTML = '';
  _rowMap = {};
  for (var i = 0; i < proxyResults.length; i++) {
    var item = proxyResults[i];
    var row = document.createElement('div');
    row.setAttribute('data-idx', i);
    var phase = _getPhase(item);
    row.className = 'live-row flex items-center justify-between px-4 py-2.5 rounded-xl bg-white border border-slate-100 ' + _rowOpacityClass(phase);
    row.style.animation = 'fadeInUp .35s cubic-bezier(.16,1,.3,1) both';
    row.style.animationDelay = (i * 30) + 'ms';
    row.innerHTML = _rowInnerHtml(item);
    c.appendChild(row);
    _rowMap[i] = row;
  }
  _listReady = true;
}

function updateLiveList() {
  if (!_listReady) { initLiveList(); return; }
  var c = document.getElementById('live-list');
  clearTimeout(_flipCleanup);
  for (var i = 0; i < proxyResults.length; i++) { _rowMap[i].style.transition = 'none'; _rowMap[i].style.transform = ''; }
  c.offsetHeight;
  for (var i = 0; i < proxyResults.length; i++) {
    var row = _rowMap[i];
    var item = proxyResults[i];
    var phase = _getPhase(item);
    row.className = 'live-row flex items-center justify-between px-4 py-2.5 rounded-xl bg-white border border-slate-100 ' + _rowOpacityClass(phase);
    row.style.animation = '';
    row.style.animationDelay = '';
    row.innerHTML = _rowInnerHtml(item);
  }
  var firstRects = {};
  for (var i = 0; i < proxyResults.length; i++) { firstRects[i] = _rowMap[i].getBoundingClientRect(); }
  var sorted = _getSortedOrder();
  for (var i = 0; i < sorted.length; i++) { c.appendChild(_rowMap[sorted[i]]); }
  var moved = false;
  for (var i = 0; i < proxyResults.length; i++) {
    var first = firstRects[i];
    var last = _rowMap[i].getBoundingClientRect();
    var deltaY = first.top - last.top;
    if (Math.abs(deltaY) > 0.5) { moved = true; _rowMap[i].style.transform = 'translateY(' + deltaY + 'px)'; }
  }
  if (moved) {
    c.offsetHeight;
    for (var i = 0; i < proxyResults.length; i++) {
      if (_rowMap[i].style.transform) {
        _rowMap[i].style.transition = 'transform 0.45s cubic-bezier(0.16, 1, 0.3, 1)';
        _rowMap[i].style.transform = 'translateY(0)';
      }
    }
    _flipCleanup = setTimeout(function() {
      for (var i = 0; i < proxyResults.length; i++) { if (_rowMap[i]) { _rowMap[i].style.transition = ''; _rowMap[i].style.transform = ''; } }
    }, 500);
  }
}

function applyLatencyResult(item, result) {
  item.latency = result.latency;
  item.latencySuccess = result.success;
  item.latencyError = result.error || '';
  item._tl = false;
  item._ld = true;
  if (item.latencySuccess && item.latency >= LATENCY_CUTOFF) {
    item._skip = true;
    item.speedTested = true;
    item.speedSuccess = false;
    item.speedError = '延迟过高已跳过';
    item._sd = true;
  }
}

async function runAllTests() {
  if (isTesting) return;
  isTesting = true;
  initTopStatus();
  document.getElementById('best-card').classList.add('hidden');
  document.getElementById('best-card').innerHTML = '';
  document.getElementById('backup-section').classList.add('hidden');
  document.getElementById('backup-section').innerHTML = '';
  document.getElementById('no-routes').classList.add('hidden');

  document.getElementById('error-card').classList.add('hidden');

  document.getElementById('live-list').classList.remove('hidden');

  document.getElementById('elapsed-area').classList.remove('hidden');
  proxyResults = [];

  _rowMap = {};

  _phase = 'latency';

  for (var i = 0; i < GITHUB_PROXIES.length; i++) {

    proxyResults.push({
      name: proxy.name, url: proxy.url, desc: proxy.desc,
      latency: 0, latencySuccess: false, latencyError: '',
      speed: 0, speedTested: false, speedSuccess: false, speedError: '', speedNote: '', hasAnomaly: false,
      _tl: true, _ts: false, _ld: false, _sd: false, _skip: false
    });
  }
  updateLiveList();
  showProgress('延迟测试', 0, GITHUB_PROXIES.length);
  var latencyPromises = proxyResults.map(function(item, idx) {
    var testUrl = item.url + GITHUB_RELEASE_URL + '?_t=' + Date.now() + '_' + idx;
    return measureLatency(testUrl, LATENCY_TIMEOUT).then(function(result) {
      applyLatencyResult(item, result);
      updateLiveList();
      showProgress('延迟测试', proxyResults.filter(function(r) { return r._ld; }).length, GITHUB_PROXIES.length);
      return item;
    });
  });
  await Promise.allSettled(latencyPromises);
  var failedItems = proxyResults.filter(function(r) { return r._ld && !r.latencySuccess && !r._skip; });
  if (failedItems.length > 0) {
    setStatus('重试失败的线路...');
    await new Promise(function(r) { setTimeout(r, RETRY_DELAY); });
    for (var fi = 0; fi < failedItems.length; fi++) { failedItems[fi]._tl = true; failedItems[fi]._ld = false; }
    updateLiveList();
    var retryPromises = failedItems.map(function(item, idx) {
      var testUrl = item.url + GITHUB_RELEASE_URL + '?_t=' + Date.now() + '&retry=1_' + idx;
      return measureLatency(testUrl, LATENCY_TIMEOUT).then(function(result) {
        applyLatencyResult(item, result);
        updateLiveList();
        showProgress('延迟测试', proxyResults.filter(function(r) { return r._ld; }).length, GITHUB_PROXIES.length);
        return item;
      });
    });
    await Promise.allSettled(retryPromises);
  }
  ensureSeg(0);
  addSeg('正在测试线路稳定性...', 'text-slate-400');
  _phase = 'speed';
  var avail = proxyResults.filter(function(r) { return r.latencySuccess && !r._skip; });
  if (avail.length === 0) {
    var totalTime = stopTimer();
    document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-amber-500';
    document.getElementById('progress-bar').className = 'h-full rounded-full bg-amber-400 transition-all duration-500 ease-out';
    document.getElementById('progress-bar').style.width = '100%';
    setStatus('测速完成（使用备用线路）');
    ensureSeg(1);
    _segs.push({text: '解析成功 ! !', cls: 'text-amber-500'});
    _segs.push({text: '本次耗时 ' + totalTime + 's', cls: 'text-slate-400'});
    calcTopFs();
    await fastTypeToEnd();
    renderFinal(totalTime);
    isTesting = false;
    return;
  }
  setStatus('正在测试线路稳定性...');
  showProgress('稳定性测速', 0, avail.length);
  var speedPromises = avail.map(function(item) {
    item._ts = true;
    updateLiveList();
    return measureSpeedByMultiplePings(item.url).then(function(sr) {
      item.speedTested = true;
      item.speedSuccess = sr.success;
      item.speed = sr.speed;
      item.speedError = sr.error || '';
      item.speedNote = sr.note || '';
      item.hasAnomaly = sr.hasAnomaly || false;
      item._ts = false;
      item._sd = true;
      updateLiveList();
      showProgress('稳定性测速', avail.filter(function(r) { return r._sd; }).length, avail.length);
      return item;
    });
  });
  await Promise.allSettled(speedPromises);
  var totalTime = stopTimer();
  document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-emerald-500';
  document.getElementById('progress-bar').className = 'h-full rounded-full bg-emerald-500 transition-all duration-500 ease-out';
  document.getElementById('progress-bar').style.width = '100%';
  setStatus('测速完成');
  ensureSeg(1);
  var goodOnes = proxyResults.filter(function(r) { return r.latencySuccess && r.speedSuccess; });
  _segs.push({text: '解析成功 ! !', cls: goodOnes.length > 0 ? 'text-emerald-500' : 'text-amber-500'});
  _segs.push({text: '本次耗时 ' + totalTime + 's', cls: 'text-slate-400'});
  _segs.push({text: '如下载缓慢，请切换下方其他线路', cls: 'text-indigo-400'});
  calcTopFs();
  await fastTypeToEnd();
  await new Promise(function(r) { setTimeout(r, 300); });
  renderFinal(totalTime);
  isTesting = false;
}

window.addEventListener('DOMContentLoaded', function() {
  var urlParam = getQueryParam('url');
  var repoInfo = parseGitHubRepoUrl(urlParam);
  if (!repoInfo) {
    var errorCard = document.getElementById('error-card');
    document.getElementById('error-title').textContent = '参数错误';
    document.getElementById('error-desc').textContent = '请提供有效的 GitHub 仓库链接作为 url 参数';
    errorCard.classList.remove('hidden');
    document.getElementById('testing-status').classList.add('hidden');
    return;
  }
  currentRepoInfo = repoInfo;
  GITHUB_REPO_URL = 'https://github.com/' + repoInfo.fullName;
  setTimeout(function() { autoFitFooter(); runAllTests(); }, 300);
});

window.addEventListener('resize', function() {
  autoFitFooter();
  calcTopFs();
  var p = document.querySelector('#top-status p');
  if (p && _targetFs) p.style.fontSize = _targetFs;
});
</script>
</body>
</html>
