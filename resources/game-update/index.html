          <div class="skeleton-line w50"></div>
          <div class="skeleton-line w90"></div>
          <div class="skeleton-line w40"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="search-section">
    <div class="search-container" id="searchContainer">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索版本号、描述内容..." autocomplete="off">
      <span class="search-mascot"></span>
      <ul class="search-dropdown" id="searchDropdown"></ul>
    </div>
  </section>

  <section class="history-section">
    <div class="history-header">
      <h2 class="history-title">历史版本</h2>
      <div class="tab-group">
        <button class="tab-btn active" data-tab="launcher" id="tabLauncher">启动器</button>
        <button class="tab-btn" data-tab="game" id="tabGame">本体包</button>
      </div>
    </div>
    <div class="version-list" id="versionList"></div>
    <div class="pagination" id="pagination"></div>
  </section>

  <footer class="footer">
    <p>STS2娘化MOD站 © 2026 壹个屑猫猫</p>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var LAUNCHER_ICON = 'http://shp.qpic.cn/collector/1976464052/97d2e4e6-a0ac-4104-99ec-13b66af8a785/0';
  var GAME_ICON = 'http://shp.qpic.cn/collector/1976464052/e2e5de8f-a1cd-40e2-aef5-e6acc9327b3b/0';
  var TUTORIAL_URL = 'https://pd.qq.com/s/vgb8c8gn';

  /* ===== 修复：使用从根目录开始的绝对路径 ===== */
  var LAUNCHER_DL_URL = '/resources/github_parsing/?url=https://github.com/ModinMobileSTS/Sts2MobileLauncher';

  /* ===== 降级用的静态数据 ===== */
  var FALLBACK_LAUNCHER_DATA = {
    version: '0.1.0',
    date: '2026-06-07',
    size: '66.65MB',
    description: '修复联机大厅跨端联机连不上的BUG[2026-06-07]——这是加载(杀戮尖塔2)本体包的启动器，启动器与本体包须配套使用，缺一不可。目前推荐的游戏本体包版本为 v0.103.2 因为兼容性很不错（PS：你也可以同时装多个版本，启动器支持游戏本体包的多版本切换）'
  };

  var gameData = [
    { version: 'v0.103.2', date: '2026-06-05', size: '829.44MB', description: '首个大更新！重做进阶6（删卡变贵），数值锁上限并移除纪元遗物以强力限制无限流，Boss重做，新增徽章与恐惧症模式。', downloadUrl: 'https://files.zohopublic.com.cn/public/workdrive-public/download/05fgz6b56a9c2329149028afac59056d22849?x-cli-msg=%7B%22isFileOwner%22%3Afalse%2C%22version%22%3A%221.0%22%2C%22isWDSupport%22%3Afalse%7D', isLatest: false },
    { version: 'v0.103.3', date: '2026-06-05', size: '829.44MB', description: '纯修Bug补丁（v0.103.2的修复版）。重点修复游戏崩溃、手柄交互、多人联机及遗物软锁问题，无新机制，纯粹提升稳定性。', downloadUrl: 'https://files.zohopublic.com.cn/public/workdrive-public/download/05fgz6ff2c90c0b7248249d818620ae68b451?x-cli-msg=%7B%22isFileOwner%22%3Afalse%2C%22version%22%3A%221.0%22%2C%22isWDSupport%22%3Afalse%7D', isLatest: false },
    { version: 'v0.106.1', date: '2026-06-05', size: '862.12MB', description: '新Boss修复。专为v0.106.0新增Boss永劫沙漏修Bug，修复其Wither卡牌在金字塔下异常保留、误强化及意图显示错误。', downloadUrl: 'https://files.zohopublic.com.cn/public/workdrive-public/download/05fgza86aaebac7d941cf8067bb86a0fd48be?x-cli-msg=%7B%22isFileOwner%22%3Afalse%2C%22version%22%3A%221.0%22%2C%22isWDSupport%22%3Afalse%7D', isLatest: false },
    { version: 'v0.107.0', date: '2026-06-05', size: '865.39MB', description: '这个版本我还没玩过，啥时候更新的？所以...猫猫暂时还没有想好介绍哦...', downloadUrl: 'https://files.zohopublic.com.cn/public/workdrive-public/download/05fgz43be7b3709f540b5be6ba344a6212b33?x-cli-msg=%7B%22isFileOwner%22%3Afalse%2C%22version%22%3A%221.0%22%2C%22isWDSupport%22%3Afalse%7D', isLatest: false }
  ];

  var activeTab = 'launcher';
  var currentPage = 1;
  var ITEMS_PER_PAGE = 8;
  var currentFilteredData = null;

  var latestCard = document.getElementById('latestCard');
  var versionList = document.getElementById('versionList');
  var paginationEl = document.getElementById('pagination');
  var searchInput = document.getElementById('searchInput');
  var searchDropdown = document.getElementById('searchDropdown');
  var searchContainer = document.getElementById('searchContainer');
  var tabLauncher = document.getElementById('tabLauncher');
  var tabGame = document.getElementById('tabGame');
  var toastEl = document.getElementById('toast');
  var toastTimer;

  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2200);
  }

  function checkOverflow(textEl, toggleEl) {
    if (textEl.textContent.length > 40) { toggleEl.style.display = 'inline'; return; }
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        if (textEl.scrollWidth > textEl.clientWidth + 2) { toggleEl.style.display = 'inline'; }
      });
    });
  }

  /* ===== 自适应字号：确保单行不换行 ===== */
  function autoFitVersionLine() {
    var lineEl = document.querySelector('.latest-version-line');
    if (!lineEl) return;
    var container = lineEl.parentElement;
    if (!container) return;
    var availableWidth = container.clientWidth;
    if (availableWidth <= 0) return;

    /* 从最大字号开始尝试，逐步缩小直到不换行 */
    var maxFontSize = 1.3;
    var minFontSize = 0.68;
    var step = 0.02;
    var currentSize = maxFontSize;

    lineEl.style.fontSize = currentSize + 'rem';

    while (currentSize > minFontSize) {
      if (lineEl.scrollWidth <= availableWidth + 2) break;
      currentSize -= step;
      lineEl.style.fontSize = currentSize + 'rem';
    }
  }

  /* ===== 从 GitHub API 获取最新 Release ===== */
  async function fetchLatestLauncherRelease() {
    var apiUrl = 'https://api.github.com/repos/ModinMobileSTS/Sts2MobileLauncher/releases/latest';
    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 8000);

    try {
      var resp = await fetch(apiUrl, {
        headers: { 'Accept': 'application/vnd.github.v3+json' },
        signal: controller.signal
      });
      clearTimeout(timeoutId);

      if (!resp.ok) throw new Error('API 请求失败: ' + resp.status);
      var data = await resp.json();

      var result = {};
      if (data.tag_name) result.version = data.tag_name;
      if (data.published_at) {
        var dt = new Date(data.published_at);
        result.date = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
      }
      if (data.assets && data.assets.length > 0 && data.assets[0].size) {
        result.size = (data.assets[0].size / 1048576).toFixed(2) + 'MB';
      }
      if (data.body) result.description = data.body;

      return result;
    } catch (e) {
      console.warn('获取 GitHub Release 失败，使用降级数据:', e);
      return null;
    }
  }

  /* ===== 渲染最新版本卡片 ===== */
  function renderLatestCard(data) {
    if (!data) {
      /* API 失败时使用降级数据 */
      data = FALLBACK_LAUNCHER_DATA;
    }

    latestCard.style.display = 'flex';
    latestCard.innerHTML =
      '<img class="latest-icon" src="' + LAUNCHER_ICON + '" alt="启动器图标" onerror="this.style.display=\'none\'">' +
      '<div class="latest-info">' +
        '<div class="latest-version-line" id="versionLine">' +
          '<span class="latest-version" style="font-size:inherit">v' + (data.version || '-') + '</span>' +
          '<span class="latest-version-tag"> / 最新版本 / 启动器 / ' + (data.size || '-') + '</span>' +
        '</div>' +
        '<div class="latest-hint">* 这只是启动器 需配合游戏本体一起使用</div>' +
        '<div class="desc-wrap">' +
          '<span class="desc-text" id="latest-desc">' + (data.description || '暂无更新说明') + '</span>' +
          '<span class="desc-toggle" id="latest-toggle" style="display:none;">展开</span>' +
        '</div>' +
        '<div class="latest-actions">' +
          '<a class="btn-dl" href="' + LAUNCHER_DL_URL + '" target="_blank" rel="noopener">下载启动器</a>' +
          '<a class="btn-tutorial" href="' + TUTORIAL_URL + '" target="_blank" rel="noopener">使用教程</a>' +
        '</div>' +
      '</div>';

    var de = document.getElementById('latest-desc'), te = document.getElementById('latest-toggle');
    if (de && te) {
      checkOverflow(de, te);
      te.addEventListener('click', function() {
        var ex = de.classList.toggle('expanded');
        te.textContent = ex ? '收起' : '展开';
      });
    }

    /* 自适应字号 */
    autoFitVersionLine();
    window.addEventListener('resize', autoFitVersionLine);
  }

  function getCurrentData() {
    var data = activeTab === 'launcher' ? [] : gameData;
    var query = searchInput.value.trim().toLowerCase();
    if (query) {
      data = data.filter(function(item) {
        return item.version.toLowerCase().indexOf(query) !== -1 || item.description.toLowerCase().indexOf(query) !== -1;
      });
    }
    currentFilteredData = data;
    return data;
  }

  function renderVersionCards(pageData) {
    versionList.innerHTML = '';
    if (pageData.length === 0) {
      versionList.innerHTML = '<div class="empty-state">没有找到匹配的版本</div>';
      return;
    }
    pageData.forEach(function(item, idx) {
      var card = document.createElement('div');
      card.className = 'version-card';
      var did = 'vd-' + activeTab + '-' + idx, tid = 'vt-' + activeTab + '-' + idx;
      card.innerHTML =
        '<div class="version-card-inner">' +
          '<div class="version-info">' +
            '<div class="version-name">' + item.version + '</div>' +
            '<div class="vdesc-wrap">' +
              '<span class="vdesc-text" id="' + did + '">' + item.description + '</span>' +
              '<span class="vdesc-toggle" id="' + tid + '" style="display:none;">展开</span>' +
            '</div>' +
            '<div class="version-meta">' +
              '<span class="version-meta-tag">' + item.size + '</span>' +
              '<span class="version-meta-tag">' + item.date + '</span>' +
            '</div>' +
          '</div>' +
          '<a class="version-dl-btn" href="' + item.downloadUrl + '" target="_blank" rel="noopener">下载</a>' +
        '</div>';
      versionList.appendChild(card);
      var de = document.getElementById(did), te = document.getElementById(tid);
      if (de && te) {
        (function(d, t) {
          checkOverflow(d, t);
          t.addEventListener('click', function() {
            var ex = d.classList.toggle('expanded');
            t.textContent = ex ? '收起' : '展开';
          });
        })(de, te);
      }
    });
  }

  function renderPagination(totalItems, currentPageNum) {
    paginationEl.innerHTML = '';
    var totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
    if (totalPages <= 1) return;

    function createBtn(cls, content, disabled, handler) {
      var btn = document.createElement('button');
      btn.className = cls; btn.innerHTML = content;
      btn.style.flexShrink = '1'; btn.style.minWidth = '0';
      if (disabled) btn.disabled = true;
      if (handler) btn.addEventListener('click', handler);
      return btn;
    }
    function createPageBtn(num) {
      return createBtn('pagination-page' + (num === currentPageNum ? ' active' : ''), num, false, function() {
        currentPage = num; renderCurrentPage();
        versionList.scrollIntoView({behavior: 'smooth', block: 'start'});
      });
    }
    function createDots() {
      var s = document.createElement('span');
      s.className = 'pagination-dots'; s.textContent = '...';
      s.style.flexShrink = '1'; s.style.minWidth = '0'; return s;
    }

    var items = [];
    items.push(createBtn('pagination-btn', '&#8249;', currentPageNum <= 1, function() {
      if (currentPage > 1) { currentPage--; renderCurrentPage(); versionList.scrollIntoView({behavior:'smooth',block:'start'}); }
    }));
    items.push(createPageBtn(1));
    if (totalPages <= 4) {
      for (var i = 2; i <= totalPages; i++) items.push(createPageBtn(i));
    } else {
      if (currentPageNum <= 4) {
        for (var j = 2; j <= 4; j++) items.push(createPageBtn(j));
        items.push(createDots()); items.push(createPageBtn(totalPages));
      } else {
        items.push(createDots());
        if (currentPageNum - 1 > 1) items.push(createPageBtn(currentPageNum - 1));
        items.push(createPageBtn(currentPageNum));
        if (currentPageNum + 1 < totalPages) items.push(createPageBtn(currentPageNum + 1));
        items.push(createDots()); items.push(createPageBtn(totalPages));
      }
    }
    items.push(createBtn('pagination-btn', '&#8250;', currentPageNum >= totalPages, function() {
      if (currentPage < totalPages) { currentPage++; renderCurrentPage(); versionList.scrollIntoView({behavior:'smooth',block:'start'}); }
    }));
    items.forEach(function(it) { paginationEl.appendChild(it); });

    var gw = document.createElement('span');
    gw.className = 'pagination-goto'; gw.style.flexShrink = '0'; gw.style.marginLeft = '8px';
    var gi = document.createElement('input');
    gi.type = 'text'; gi.className = 'pagination-goto-input';
    gi.placeholder = '\\'; gi.maxLength = 3; gi.setAttribute('aria-label', '输入页码');
    var gb = document.createElement('button');
    gb.className = 'pagination-goto-btn';
    gb.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" style="width:18px;height:18px"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17.5" y2="17.5"/></svg>';
    gb.setAttribute('aria-label', '跳转到指定页');
    var gm = document.createElement('button');
    gm.className = 'pagination-goto-mobile-trigger';
    gm.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" style="width:14px;height:14px"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17.5" y2="17.5"/></svg>';
    gm.setAttribute('aria-label', '跳转页码');

    function doGoto(v) {
      var n = parseInt(v, 10);
      if (isNaN(n) || n < 1 || n > totalPages) { showToast('页码范围：1 ~ ' + totalPages); return; }
      currentPage = n; renderCurrentPage(); gi.value = '';
      versionList.scrollIntoView({behavior:'smooth',block:'start'});
    }
    gi.addEventListener('input', function() { this.value = this.value.replace(/[^\d]/g, '').slice(0, 3); });
    gi.addEventListener('keydown', function(e) { if (e.key === 'Enter') doGoto(this.value); });
    gb.addEventListener('click', function() { doGoto(gi.value); });
    gm.addEventListener('click', function() { openGotoPopup(totalPages); });
    gw.appendChild(gi); gw.appendChild(gb); gw.appendChild(gm);
    paginationEl.appendChild(gw);
  }

  function openGotoPopup(totalPages) {
    var ex = document.getElementById('gotoPopupOverlay'); if (ex) ex.remove();
    var ol = document.createElement('div');
    ol.className = 'goto-popup-overlay active'; ol.id = 'gotoPopupOverlay';
    var pp = document.createElement('div'); pp.className = 'goto-popup';
    var tt = document.createElement('div'); tt.className = 'goto-popup-title';
    tt.textContent = '跳转到第几页？(共 ' + totalPages + ' 页)';
    var rw = document.createElement('div'); rw.className = 'goto-popup-row';
    var ip = document.createElement('input');
    ip.type = 'text'; ip.className = 'goto-popup-input'; ip.placeholder = '页码';
    ip.maxLength = 3; ip.inputMode = 'numeric';
    ip.addEventListener('input', function() { this.value = this.value.replace(/[^\d]/g, '').slice(0, 3); });
    var cb = document.createElement('button'); cb.className = 'goto-popup-confirm'; cb.textContent = '跳转';
    function doG() {
      var n = parseInt(ip.value, 10);
      if (isNaN(n) || n < 1 || n > totalPages) { showToast('页码范围：1 ~ ' + totalPages); return; }
      currentPage = n; renderCurrentPage(); ol.remove();
      setTimeout(function() { versionList.scrollIntoView({behavior:'smooth',block:'start'}); }, 50);
    }
    ip.addEventListener('keydown', function(e) { if (e.key === 'Enter') doG(); });
    cb.addEventListener('click', doG);
    ol.addEventListener('click', function(e) { if (e.target === ol) ol.remove(); });
    rw.appendChild(ip); rw.appendChild(cb);
    pp.appendChild(tt); pp.appendChild(rw);
    ol.appendChild(pp); document.body.appendChild(ol);
    setTimeout(function() { ip.focus(); }, 100);
  }

  function renderCurrentPage() {
    var data = getCurrentData();
    var start = (currentPage - 1) * ITEMS_PER_PAGE;
    renderVersionCards(data.slice(start, start + ITEMS_PER_PAGE));
    renderPagination(data.length, currentPage);
  }

  function switchTab(tab) {
    activeTab = tab; currentPage = 1;
    searchInput.value = ''; searchDropdown.classList.remove('active');
    tabLauncher.classList.toggle('active', tab === 'launcher');
    tabGame.classList.toggle('active', tab === 'game');
    renderCurrentPage();
  }

  tabLauncher.addEventListener('click', function() { switchTab('launcher'); });
  tabGame.addEventListener('click', function() { switchTab('game'); });

  function updateSearchDropdown() {
    var query = searchInput.value.trim();
    searchDropdown.innerHTML = '';
    if (!query) { searchDropdown.classList.remove('active'); return; }
    var lq = query.toLowerCase(), results = [];
    gameData.forEach(function(item) {
      if (item.version.toLowerCase().indexOf(lq) !== -1 || item.description.toLowerCase().indexOf(lq) !== -1) {
        results.push({item: item, type: 'game', typeName: '游戏本体'});
      }
    });
    if (results.length === 0) {
      searchDropdown.innerHTML = '<li class="search-dropdown-empty">没有找到匹配的版本</li>';
    } else {
      var eq = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), rx = new RegExp('(' + eq + ')', 'gi');
      results.slice(0, 8).forEach(function(r) {
        var li = document.createElement('li'); li.className = 'search-dropdown-item';
        li.innerHTML = '<span class="search-item-type ' + r.type + '">' + r.typeName + '</span><span>' + r.item.version.replace(rx, '<mark>$1</mark>') + '</span>';
        li.addEventListener('click', function() {
          if (activeTab !== r.type) switchTab(r.type);
          searchInput.value = ''; searchDropdown.classList.remove('active');
          var fd = gameData;
          var idx = -1;
          for (var i = 0; i < fd.length; i++) { if (fd[i].version === r.item.version) { idx = i; break; } }
          if (idx !== -1) {
            currentPage = Math.floor(idx / ITEMS_PER_PAGE) + 1;
            renderCurrentPage();
            setTimeout(function() {
              var cards = versionList.querySelectorAll('.version-card');
              var ci = idx % ITEMS_PER_PAGE;
              if (cards[ci]) {
                cards[ci].style.boxShadow = '0 0 0 3px var(--sm), var(--sd)';
                cards[ci].scrollIntoView({behavior:'smooth', block:'center'});
                setTimeout(function() { cards[ci].style.boxShadow = ''; }, 2000);
              }
            }, 100);
          }
        });
        searchDropdown.appendChild(li);
      });
    }
    searchDropdown.classList.add('active');
  }

  searchInput.addEventListener('input', function() {
    currentPage = 1; renderCurrentPage(); updateSearchDropdown();
  });
  searchInput.addEventListener('focus', function() {
    if (searchInput.value.trim().length >= 1) updateSearchDropdown();
  });
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { searchDropdown.classList.remove('active'); searchInput.blur(); }
    if (e.key === 'Enter') searchDropdown.classList.remove('active');
  });
  document.addEventListener('click', function(e) {
    if (!searchContainer.contains(e.target)) searchDropdown.classList.remove('active');
  });

  /* ===== 页面初始化：先显示骨架屏，再异步获取数据 ===== */
  async function initLatestCard() {
    var releaseData = await fetchLatestLauncherRelease();
    renderLatestCard(releaseData);
  }

  initLatestCard();
  renderCurrentPage();
})();
</script>
</body>
</html>
